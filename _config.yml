title: "Humanoid Robot Learning Paper Notebooks"
description: "人形机器人强化学习论文笔记"
url: "https://imchong.github.io"
baseurl: "/Humanoid_Robot_Learning_Paper_Notebooks"

markdown: kramdown
kramdown:
  math_engine: null
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter: null

# Include papers directory (Jekyll ignores dirs starting with _ by default)
include:
  - papers

# Exclude unnecessary files from build
exclude:
  - README.md
  - progress.json
  - papers/PROGRESS.md
  - scripts/
  - .obsidian/
  - "*.pdf"
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CNAME

# Default front matter for paper pages
defaults:
  - scope:
      path: "papers"
      type: "pages"
    values:
      layout: "paper"
