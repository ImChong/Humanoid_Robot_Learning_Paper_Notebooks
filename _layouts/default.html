<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-lang-mode="en">
<head>
  <meta charset="UTF-8">
  <script>
    /* Apply saved theme before first paint (avoids light flash). */
    (function () {
      function getSiteTheme() {
        try {
          return localStorage.getItem('theme') === 'light' ? 'light' : 'dark';
        } catch (e) {
          return 'dark';
        }
      }
      window.getSiteTheme = getSiteTheme;
      document.documentElement.setAttribute('data-theme', getSiteTheme());
    })();
  </script>
  <style>
    html { color-scheme: dark; background-color: #1e1e1e; }
    html[data-theme="light"] { color-scheme: light; background-color: #ffffff; }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    CSP (defence-in-depth). Static site, no fetch/XHR — only KaTeX & mermaid
    are loaded from jsdelivr. ``'unsafe-inline'`` is unfortunately required by
    the inline <script>/<style> blocks below and by mermaid's generated SVG
    style attrs; tighten further by externalising scripts in the future.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'none'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- KaTeX (pinned + SRI) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
        integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV"
        crossorigin="anonymous">
  <script defer
          src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
          integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
          crossorigin="anonymous"></script>
  <script defer
          src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
          integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05"
          crossorigin="anonymous"></script>
  <!-- DOMPurify (pinned + SRI) -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"
          integrity="sha384-eEu5CTj3qGvu9PdJuS+YlkNi7d2XxQROAFYOr59zgObtlcux1ae1Il3u7jvdCSWu"
          crossorigin="anonymous"></script>
  <!-- Mermaid (pinned + SRI) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"
          integrity="sha384-rbtjAdnIQE/aQJGEgXrVUlMibdfTSa4PQju4HDhN3sR2PmaKFzhEafuePsl9H/9I"
          crossorigin="anonymous"></script>
  <script src="{{ '/assets/js/mermaid-config.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/mermaid-zoom.js' | relative_url }}" defer></script>
  <script>
    function initMermaid(theme) {
      if (typeof mermaid === 'undefined') return;
      var config =
        typeof window.getMermaidSiteConfig === 'function'
          ? window.getMermaidSiteConfig(theme)
          : {
              startOnLoad: false,
              theme: theme === 'dark' ? 'dark' : 'default',
              flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' },
              securityLevel: 'strict',
            };
      mermaid.initialize(config);
      window.roadmapMermaidConfigured = true;
      
      // 1. Snapshot source once (keep <br> as newlines); re-render from snapshot on theme changes.
      document.querySelectorAll('.mermaid:not(#roadmap-mermaid)').forEach(function(el) {
        var readSource =
          typeof window.readMermaidBlockSource === 'function'
            ? window.readMermaidBlockSource
            : function(node) {
                return (node.getAttribute('data-original-code') || node.textContent || '').trim();
              };
        var writeSource =
          typeof window.writeMermaidBlockSource === 'function'
            ? window.writeMermaidBlockSource
            : function(node, source) {
                node.textContent = source;
              };
        if (!el.getAttribute('data-original-code')) {
          var source = readSource(el);
          if (source) el.setAttribute('data-original-code', source);
        }
        el.removeAttribute('data-processed');
        writeSource(el, el.getAttribute('data-original-code'));
      });

      var nodes = Array.prototype.slice.call(document.querySelectorAll('.mermaid:not(#roadmap-mermaid)'));
      var paperRun =
        nodes.length > 0 ? Promise.resolve(mermaid.run({ nodes: nodes })) : Promise.resolve();
      var roadmapRun =
        window.renderRoadmapMermaid
          ? window.renderRoadmapMermaid(document.documentElement.getAttribute('data-lang-mode') || 'en')
          : Promise.resolve();

      Promise.all([paperRun, roadmapRun]).then(function() {
        if (typeof window.initKaTeX === 'function') window.initKaTeX();
      });
    }
  </script>

</head>
<body>
  {% include header.html %}
  <main class="container">
    {{ content }}
  </main>
  {% include footer.html %}

  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle Sidebar">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script>
    /* ─── Sidebar Logic ────────────────────────────────────── */
    (function() {
      var toggle = document.getElementById('sidebar-toggle');
      var overlay = document.getElementById('sidebar-overlay');
      var sidebar = document.getElementById('toc-sidebar');
      
      function openSidebar() {
        if (sidebar) sidebar.classList.add('open');
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
      }
      
      function closeSidebar() {
        if (sidebar) sidebar.classList.remove('open');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
      }
      
      if (toggle) {
        if (sidebar) {
          toggle.addEventListener('click', function(e) {
            e.stopPropagation();
            if (sidebar.classList.contains('open')) {
              closeSidebar();
            } else {
              openSidebar();
            }
          });
        } else {
          toggle.style.display = 'none';
        }
      }
      
      if (overlay) overlay.addEventListener('click', closeSidebar);
      
      // Close sidebar when clicking a link inside it
      if (sidebar) {
        sidebar.addEventListener('click', function(e) {
          if (e.target.tagName === 'A' || e.target.closest('a')) {
            // Delay slightly to allow the click to register before closing
            setTimeout(closeSidebar, 100);
          }
        });
      }
    })();
  </script>

  <script>
    /* ─── Language Toggle ──────────────────────────────────── */
    (function() {
      var LANG_KEY = 'cl-lang';
      var root = document.documentElement;
      var langToggle = document.getElementById('lang-toggle');
      var langLabel = langToggle ? langToggle.querySelector('.lang-label') : null;
      var roadmapSvgCache = {};
      var roadmapRenderSeq = 0;

      var roadmapGraphs = {
        en: `graph TD
    subgraph SG_Basic ["1 · Basic RL"]
        PPO(["PPO"]) --> AWR(["AWR"])
        AWR --> DM(["DeepMimic"])
    end
    subgraph SG_Data ["Data and Retargeting"]
        DataNode(["AMASS / HumanML3D"]) --> Target(["Motion Retargeting"])
    end
    subgraph SG_Style ["2 · Imitation and Style"]
        DM --> AMP(["AMP"])
        DM --> PHC(["PHC"])
        AMP --> ADD(["ADD"])
    end
    subgraph SG_Skills ["3 · Skills and Diffusion"]
        ASE(["ASE"]) --> CALM(["CALM"]) --> PULSE(["PULSE"])
        DP(["Diffusion Policy"]) --> BM(["BeyondMimic"])
    end
    subgraph SG_WBC ["4 · Whole-Body Control"]
        EWBC(["Expressive WBC"]) --> HOVER(["HOVER"])
        EWBC --> HugWBC(["HugWBC"])
        EWBC --> ExBody2(["ExBody2"])
    end
    subgraph SG_Manip ["5 · Manipulation"]
        iDP3(["iDP3"]) --> EgoMimic(["EgoMimic"])
        EgoMimic --> HumDex(["HumDex"])
    end
    subgraph SG_Loco ["6 · Loco-Manipulation"]
        HOMIE(["HOMIE"]) --> ULTRA(["ULTRA"])
        ULTRA --> Psi(["Ψ₀"])
    end
    subgraph SG_WM ["7 · World Model"]
        DreamDojo(["DreamDojo"]) --> WM1X(["1X World Model"])
        HAIC(["HAIC — Dynamics-Aware WM"])
    end
    subgraph SG_WAM ["8 · World Action Model"]
        DreamZero(["DreamZero"])
    end
    subgraph SG_FM ["9 · Foundation Models"]
        VLA(["VLA — GR00T N1"])
        BFM(["BFM — Behavior FM"])
    end
    subgraph SG_Eng ["Engineering"]
        DR(["Domain Randomization"]) --> LCP(["LCP"])
    end
    Target -.-> DM
    Target -.-> AMP
    PHC --> ASE
    PULSE --> DP
    PULSE --> EWBC
    BM --> EWBC
    BM --> iDP3
    HOVER --> HOMIE
    HugWBC --> HOMIE
    HumDex --> VLA
    ULTRA --> VLA
    Psi --> BFM
    ULTRA --> BFM
    BM --> DreamDojo
    HumDex --> DreamDojo
    ULTRA --> HAIC
    DreamDojo --> DreamZero
    WM1X --> DreamZero
    DreamZero --> VLA
    DreamZero --> BFM`,
        zh: `graph TD
    subgraph SG_Basic ["1 · 基础 RL"]
        PPO(["PPO"]) --> AWR(["AWR"])
        AWR --> DM(["DeepMimic"])
    end
    subgraph SG_Data ["数据与重定向"]
        DataNode(["AMASS / HumanML3D"]) --> Target(["动作重定向"])
    end
    subgraph SG_Style ["2 · 模仿与风格"]
        DM --> AMP(["AMP"])
        DM --> PHC(["PHC"])
        AMP --> ADD(["ADD"])
    end
    subgraph SG_Skills ["3 · 技能与扩散"]
        ASE(["ASE"]) --> CALM(["CALM"]) --> PULSE(["PULSE"])
        DP(["扩散策略"]) --> BM(["BeyondMimic"])
    end
    subgraph SG_WBC ["4 · 全身控制 WBC"]
        EWBC(["表达性 WBC"]) --> HOVER(["HOVER"])
        EWBC --> HugWBC(["HugWBC"])
        EWBC --> ExBody2(["ExBody2"])
    end
    subgraph SG_Manip ["5 · 操作 Manipulation"]
        iDP3(["iDP3"]) --> EgoMimic(["EgoMimic"])
        EgoMimic --> HumDex(["HumDex"])
    end
    subgraph SG_Loco ["6 · 移动操作 Loco-Manip"]
        HOMIE(["HOMIE"]) --> ULTRA(["ULTRA"])
        ULTRA --> Psi(["Ψ₀"])
    end
    subgraph SG_WM ["7 · 世界模型 World Model"]
        DreamDojo(["DreamDojo"]) --> WM1X(["1X 世界模型"])
        HAIC(["HAIC — 动力学感知 WM"])
    end
    subgraph SG_WAM ["8 · 世界-动作模型 WAM"]
        DreamZero(["DreamZero"])
    end
    subgraph SG_FM ["9 · 基础模型 VLA / BFM"]
        VLA(["VLA — GR00T N1"])
        BFM(["BFM — 行为基础模型"])
    end
    subgraph SG_Eng ["工程实践"]
        DR(["域随机化"]) --> LCP(["LCP"])
    end
    Target -.-> DM
    Target -.-> AMP
    PHC --> ASE
    PULSE --> DP
    PULSE --> EWBC
    BM --> EWBC
    BM --> iDP3
    HOVER --> HOMIE
    HugWBC --> HOMIE
    HumDex --> VLA
    ULTRA --> VLA
    Psi --> BFM
    ULTRA --> BFM
    BM --> DreamDojo
    HumDex --> DreamDojo
    ULTRA --> HAIC
    DreamDojo --> DreamZero
    WM1X --> DreamZero
    DreamZero --> VLA
    DreamZero --> BFM`
      };

      function getRoadmapCacheKey(mode) {
        var theme = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        return theme + ':' + mode;
      }

      window.attachRoadmapNodeLinks = function(container) {
        if (!container) return;
        var dataEl = document.querySelector('script#roadmap-node-links');
        if (!dataEl) return;
        var links;
        try {
          links = JSON.parse(dataEl.textContent);
        } catch (e) {
          return;
        }
        var svg = container.querySelector('svg');
        if (!svg) return;

        Object.keys(links).forEach(function(nodeId) {
          var url = links[nodeId];
          if (!url || typeof url !== 'string') return;
          var nodeGroup = svg.querySelector('[id^="flowchart-' + nodeId + '-"]');
          if (!nodeGroup) return;
          nodeGroup.classList.add('roadmap-node-link');
          nodeGroup.setAttribute('role', 'link');
          nodeGroup.setAttribute('tabindex', '0');
          nodeGroup.setAttribute('aria-label', nodeId);
          nodeGroup.setAttribute('data-roadmap-url', url);

          function goToNote(e) {
            if (e) {
              e.preventDefault();
              e.stopPropagation();
            }
            window.location.assign(url);
          }

          nodeGroup.addEventListener('pointerdown', function(e) {
            e.stopPropagation();
          });
          nodeGroup.addEventListener('click', goToNote);
          nodeGroup.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
              goToNote(e);
            }
          });
        });
      };

      window.renderRoadmapMermaid = function(mode) {
        var mermaidRoadmap = document.getElementById('roadmap-mermaid');
        if (!mermaidRoadmap) return Promise.resolve();

        var normalizedMode = mode === 'zh' ? 'zh' : 'en';
        var graphText = roadmapGraphs[normalizedMode].trim();
        var cacheKey = getRoadmapCacheKey(normalizedMode);
        var cachedSvg = roadmapSvgCache[cacheKey];
        var renderSeq = ++roadmapRenderSeq;

        if (cachedSvg) {
          mermaidRoadmap.innerHTML = cachedSvg;
          mermaidRoadmap.removeAttribute('data-processed');
          window.attachRoadmapNodeLinks(mermaidRoadmap);
          return Promise.resolve();
        }

        if (!window.roadmapMermaidConfigured || typeof mermaid === 'undefined' || !mermaid.render) {
          return Promise.resolve();
        }

        var renderId = 'roadmap-mermaid-' + cacheKey.replace(':', '-') + '-' + renderSeq;
        return Promise.resolve(mermaid.render(renderId, graphText)).then(function(result) {
          if (renderSeq !== roadmapRenderSeq || getRoadmapCacheKey(normalizedMode) !== cacheKey) return;
          var safeSvg =
            typeof window.sanitizeMermaidSvg === 'function'
              ? window.sanitizeMermaidSvg(result.svg)
              : typeof DOMPurify !== 'undefined'
                ? DOMPurify.sanitize(result.svg)
                : '';
          roadmapSvgCache[cacheKey] = safeSvg;
          mermaidRoadmap.innerHTML = safeSvg;
          mermaidRoadmap.removeAttribute('data-processed');
          window.attachRoadmapNodeLinks(mermaidRoadmap);
        }).catch(function() {
          // Keep the previous SVG visible if rendering fails.
        });
      };

      function applyLang(mode) {
        root.setAttribute('data-lang-mode', mode);
        root.setAttribute('lang', mode === 'zh' ? 'zh-CN' : 'en');
        localStorage.setItem(LANG_KEY, mode);
        if (langLabel) {
          langLabel.textContent = mode === 'zh' ? 'English' : '中文';
        }
        // Update all data-en/data-zh elements
        var els = document.querySelectorAll('[data-en]');
        for (var i = 0; i < els.length; i++) {
          var el = els[i];
          // For elements with only data-en/data-zh (no child text nodes), swap textContent
          var useZh = mode === 'zh';
          var text = useZh ? el.getAttribute('data-zh') : el.getAttribute('data-en');
          if (text !== null && el.textContent !== text) {
            el.textContent = text;
          }
        }
        // Update placeholders
        var placeholders = document.querySelectorAll('[data-en-placeholder]');
        for (var i = 0; i < placeholders.length; i++) {
          var el = placeholders[i];
          var useZh = mode === 'zh';
          var text = useZh ? el.getAttribute('data-zh-placeholder') : el.getAttribute('data-en-placeholder');
          if (text !== null && el.placeholder !== text) {
            el.placeholder = text;
          }
        }
        // Update aria-labels
        var arias = document.querySelectorAll('[data-en-aria-label]');
        for (var i = 0; i < arias.length; i++) {
          var el = arias[i];
          var useZh = mode === 'zh';
          var text = useZh ? el.getAttribute('data-zh-aria-label') : el.getAttribute('data-en-aria-label');
          if (text !== null && el.getAttribute('aria-label') !== text) {
            el.setAttribute('aria-label', text);
          }
        }
        window.renderRoadmapMermaid(mode);
      }

      function toggleLang() {
        var cur = root.getAttribute('data-lang-mode') || 'en';
        applyLang(cur === 'en' ? 'zh' : 'en');
      }

      // Initialize on load
      (function() {
        var saved = localStorage.getItem(LANG_KEY);
        var initial = (saved === 'zh') ? 'zh' : 'en';
        applyLang(initial);
      })();

      if (langToggle) langToggle.addEventListener('click', toggleLang);
    })();
  </script>

  <script>
    // KaTeX auto-render with HTML entity fix (math inside Mermaid is rendered by Mermaid itself).
    window.initKaTeX = function initKaTeX() {
      if (window.__katexInitialized) return true;
      if (typeof renderMathInElement === 'undefined') return false;

      // Fix HTML entities inside math delimiters before KaTeX scans the DOM.
      //
      // SECURITY: the previous version did `el.innerHTML = ...` after
      // unescaping &lt;/&gt;/&amp;, which turned `$<img onerror=...>$` in a
      // notebook into a real <img> element when the page rendered (stored
      // XSS, exploitable by anyone whose markdown reaches main).
      //
      // Walk text nodes only and mutate ``nodeValue`` in place. ``nodeValue``
      // is plain string data — assigning to it never re-parses HTML, so even
      // if the unescape introduces ``<`` characters they remain literal text.
      var mathRegex = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\$[\s\S]*?\$|\\\([\s\S]*?\\\))/g;

      // ⚡ Bolt Optimization: Restrict KaTeX DOM parsing exclusively to the main content area
      // (like #paper-body) rather than the entire document.body. This entirely skips thousands
      // of irrelevant nodes in the TOC sidebar, header, and footer, preventing main thread blocking.
      var mathContainer = document.getElementById('paper-body') || document.body;

      // ⚡ Bolt Optimization: Include SHOW_ELEMENT to proactively prune irrelevant subtrees
      // (like code blocks) by returning FILTER_REJECT, avoiding deep DOM traversal.
      function isInsideMermaid(node) {
        for (var el = node.nodeType === 1 ? node : node.parentElement; el; el = el.parentElement) {
          if (!el.classList) continue;
          if (el.classList.contains('mermaid') || el.classList.contains('mermaid-container')) return true;
          if (el.id === 'roadmap-mermaid') return true;
        }
        return false;
      }

      var walker = document.createTreeWalker(
        mathContainer, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, {
          acceptNode: function(node) {
            if (isInsideMermaid(node)) return NodeFilter.FILTER_REJECT;
            if (node.nodeType === 1) { // Element node
              var tag = node.tagName;
              if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'PRE' || tag === 'CODE' || tag === 'ANNOTATION' || tag === 'TEXTAREA') {
                return NodeFilter.FILTER_REJECT;
              }
              return NodeFilter.FILTER_SKIP;
            }
            return NodeFilter.FILTER_ACCEPT;
          }
        }
      );
      var textNode;
      while ((textNode = walker.nextNode())) {
        var v = textNode.nodeValue;
        if (!v || (v.indexOf('$') === -1 && v.indexOf('\\(') === -1 && v.indexOf('\\[') === -1)) continue;
        if (v.indexOf('&gt;') === -1 && v.indexOf('&lt;') === -1 && v.indexOf('&amp;') === -1) continue;
        var fixed = v.replace(mathRegex, function (match) {
          return match.replace(/&gt;/g, '>').replace(/&lt;/g, '<').replace(/&amp;/g, '&');
        });
        if (fixed !== v) textNode.nodeValue = fixed;
      }

      renderMathInElement(mathContainer, {
        delimiters: [
          {left: "$$", right: "$$", display: true},
          {left: "\\[", right: "\\]", display: true},
          {left: "$", right: "$", display: false},
          {left: "\\(", right: "\\)", display: false}
        ],
        ignoredTags: ['script', 'style', 'pre', 'code', 'textarea', 'annotation'],
        ignoredClasses: ['mermaid', 'mermaid-container'],
        throwOnError: false,
        strict: false
      });
      window.__katexInitialized = true;
      return true;
    };

    document.addEventListener("DOMContentLoaded", function() {
      var hasMermaid =
        document.querySelector('.mermaid') || document.getElementById('roadmap-mermaid');
      if (!hasMermaid) {
        if (!window.initKaTeX()) {
          var check = setInterval(function() {
            if (window.initKaTeX()) clearInterval(check);
          }, 100);
        }
      }
    });
  </script>
  <script>
    // Dark/Light mode
    (function() {
      var toggle = document.getElementById('theme-toggle');
      var html = document.documentElement;

      function getPreferred() {
        return typeof window.getSiteTheme === 'function' ? window.getSiteTheme() : 'dark';
      }

      function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        if (toggle) toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        
        initMermaid(theme);
      }

      setTheme(getPreferred());

      if (toggle) {
        toggle.addEventListener('click', function() {
          var current = html.getAttribute('data-theme');
          setTheme(current === 'dark' ? 'light' : 'dark');
        });
      }
    })();
  </script>
</body>
</html>
