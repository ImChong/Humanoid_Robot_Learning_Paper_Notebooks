<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-lang-mode="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  {% include header.html %}
  <main class="container">
    {{ content }}
  </main>
  {% include footer.html %}

  <script>
    /* ─── Language Toggle ──────────────────────────────────── */
    (function() {
      var LANG_KEY = 'cl-lang';
      var root = document.documentElement;
      var langToggle = document.getElementById('lang-toggle');
      var langLabel = langToggle ? langToggle.querySelector('.lang-label') : null;

      function applyLang(mode) {
        root.setAttribute('data-lang-mode', mode);
        localStorage.setItem(LANG_KEY, mode);
        if (langLabel) {
          langLabel.textContent = mode === 'zh' ? '中文' : 'EN';
        }
        // Update all data-en/data-zh elements
        var els = document.querySelectorAll('[data-en]');
        for (var i = 0; i < els.length; i++) {
          var el = els[i];
          // For elements with only data-en/data-zh (no child text nodes), swap textContent
          var useZh = mode === 'zh';
          var text = useZh ? el.getAttribute('data-zh') : el.getAttribute('data-en');
          if (text !== null) {
            el.textContent = text;
          }
        }
      }

      function toggleLang() {
        var cur = root.getAttribute('data-lang-mode') || 'en';
        applyLang(cur === 'en' ? 'zh' : 'en');
      }

      // Initialize on load
      (function() {
        var saved = localStorage.getItem(LANG_KEY);
        var initial = (saved === 'zh') ? 'zh' : 'en';
        applyLang(initial);
      })();

      if (langToggle) langToggle.addEventListener('click', toggleLang);
    })();
  </script>

  <script>
    // KaTeX auto-render with HTML entity fix
    function initKaTeX() {
      if (typeof renderMathInElement === 'undefined') return false;

      // Fix HTML entities inside math before rendering
      // Kramdown converts > to &gt; and < to &lt; inside table cells etc.
      document.querySelectorAll('td, th, li, p, span, strong, em, b, i, h1, h2, h3, h4, h5, h6').forEach(function(el) {
        var html = el.innerHTML;
        // Only process if there's a $ or \[ that suggests math content
        if (html.indexOf('$') === -1 && html.indexOf('\\[') === -1) return;
        // Replace HTML entities back inside math delimiters
        html = html.replace(/&gt;/g, '>').replace(/&lt;/g, '<').replace(/&amp;/g, '&');
        el.innerHTML = html;
      });

      renderMathInElement(document.body, {
        delimiters: [
          {left: "$$", right: "$$", display: true},
          {left: "\\[", right: "\\]", display: true},
          {left: "$", right: "$", display: false},
          {left: "\\(", right: "\\)", display: false}
        ],
        throwOnError: false,
        strict: false
      });
      return true;
    }

    document.addEventListener("DOMContentLoaded", function() {
      if (!initKaTeX()) {
        var check = setInterval(function() {
          if (initKaTeX()) clearInterval(check);
        }, 100);
      }
    });
  </script>
  <script>
    // Dark/Light mode
    (function() {
      var toggle = document.getElementById('theme-toggle');
      var html = document.documentElement;

      function getPreferred() {
        var saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function setTheme(theme) {
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      }

      setTheme(getPreferred());

      toggle.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        setTheme(current === 'dark' ? 'light' : 'dark');
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          setTheme(e.matches ? 'dark' : 'light');
        }
      });
    })();
  </script>
</body>
</html>
