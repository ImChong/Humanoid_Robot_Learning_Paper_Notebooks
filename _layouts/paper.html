---
layout: default
---
<article class="paper-content">
  <nav class="breadcrumb">
    <a href="{{ '/' | relative_url }}" data-en="🏠 Home" data-zh="🏠 首页">🏠 Home</a>
    {% assign path_parts = page.url | split: '/' %}
    {% if path_parts.size > 3 %}
      <span class="sep">›</span>
      <span class="crumb-category">{{ path_parts[2] | replace: '_', ' ' }}</span>
    {% endif %}
  </nav>

  <div class="paper-layout">
    <aside class="toc-sidebar" id="toc-sidebar">
      <div class="toc-wrapper">
        <h3 class="toc-title" data-en="📑 Contents" data-zh="📑 目录">📑 目录</h3>
        <nav class="toc-nav" id="toc-nav"></nav>
      </div>
    </aside>

    <div class="paper-body" id="paper-body">
      {{ content }}
    </div>

    <aside class="right-sidebar" id="right-sidebar">
      <div class="right-sidebar-wrapper">
        <a href="#" class="right-sidebar-link" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;" data-en="↑ Back to top" data-zh="↑ 回到顶部">↑ Back to top</a>
        <div id="sidebar-paper-nav"></div>
        <a href="{{ '/' | relative_url }}" class="right-sidebar-link" data-en="← Back to list" data-zh="← 返回论文列表">← 返回论文列表</a>
      </div>
    </aside>
  </div>

  <div class="paper-nav" id="paper-nav">
    <a href="{{ '/' | relative_url }}" class="back-link" data-en="← Back to list" data-zh="← 返回论文列表">← 返回论文列表</a>
  </div>
</article>

<script>
// Paper navigation — built from page order metadata, injected client-side
(function() {
  // paperOrderMap: url -> { title, shortTitle, url }
  // These are the 13 papers in reading order
  var paperOrder = [
    { title: "Proximal Policy Optimization (PPO)", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/01_Foundational_RL/PPO_Proximal_Policy_Optimization/PPO_Proximal_Policy_Optimization.html", short: "PPO" },
    { title: "Advantage Weighted Regression (AWR)", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/01_Foundational_RL/AWR_Advantage_Weighted_Regression/AWR_Advantage_Weighted_Regression.html", short: "AWR" },
    { title: "DeepMimic", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/01_Foundational_RL/DeepMimic_Example-Guided_Deep_RL_of_Physics-Based_Character_Skills/DeepMimic_Example-Guided_Deep_RL_of_Physics-Based_Character_Skills.html", short: "DeepMimic" },
    { title: "Adversarial Motion Priors (AMP)", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/01_Foundational_RL/AMP_Adversarial_Motion_Priors_for_Stylized_Physics-Based_Character_Control/AMP_Adversarial_Motion_Priors_for_Stylized_Physics-Based_Character_Control.html", short: "AMP" },
    { title: "Perpetual Humanoid Control (PHC)", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/01_Foundational_RL/PHC_Perpetual_Humanoid_Control/PHC_Perpetual_Humanoid_Control.html", short: "PHC" },
    { title: "Adversarial Skill Embeddings (ASE)", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/01_Foundational_RL/ASE_Adversarial_Skill_Embeddings_for_Large-Scale_Motion_Control/ASE_Adversarial_Skill_Embeddings_for_Large-Scale_Motion_Control.html", short: "ASE" },
    { title: "Adversarial Disentanglement and Distillation (ADD)", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/01_Foundational_RL/ADD_Adversarial_Differential_Discriminators/ADD_Adversarial_Differential_Discriminators.html", short: "ADD" },
    { title: "Expressive Whole-Body Control", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/03_High_Impact_Selection/Expressive_Whole-Body_Control_for_Humanoid_Robots/Expressive_Whole-Body_Control_for_Humanoid_Robots.html", short: "Expressive" },
    { title: "VIGOR", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/04_Loco-Manipulation_and_WBC/VIGOR_Visual_Goal-In-Context_Inference_for_Unified_Humanoid_Fall_Safety/VIGOR_Visual_Goal-In-Context_Inference_for_Unified_Humanoid_Fall_Safety.html", short: "VIGOR" },
    { title: "HERO (Learning Humanoid End-Effector Control)", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/04_Loco-Manipulation_and_WBC/Learning_Humanoid_End-Effector_Control_for_Open-Vocabulary_Visual_Loco-Manipulation/Learning_Humanoid_End-Effector_Control_for_Open-Vocabulary_Visual_Loco-Manipulation.html", short: "HERO/LEEC" },
    { title: "LessMimic", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/04_Loco-Manipulation_and_WBC/LessMimic_Long-Horizon_Humanoid_Interaction_with_Unified_Distance_Field_Representations/LessMimic_Long-Horizon_Humanoid_Interaction_with_Unified_Distance_Field_Representations.html", short: "LessMimic" },
    { title: "OmniXtreme", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/04_Loco-Manipulation_and_WBC/OmniXtreme_Breaking_the_Generality_Barrier_in_High-Dynamic_Humanoid_Control/OmniXtreme_Breaking_the_Generality_Barrier_in_High-Dynamic_Humanoid_Control.html", short: "OmniXtreme" },
    { title: "ULTRA", url: "/Humanoid_Robot_Learning_Paper_Notebooks/papers/04_Loco-Manipulation_and_WBC/ULTRA_Unified_Multimodal_Control_for_Autonomous_Humanoid_Whole-Body_Loco-Manipulation/ULTRA_Unified_Multimodal_Control_for_Autonomous_Humanoid_Whole-Body_Loco-Manipulation.html", short: "ULTRA" },
  ];

  var currentPath = window.location.pathname;
  var currentIdx = -1;
  for (var i = 0; i < paperOrder.length; i++) {
    if (currentPath.indexOf(paperOrder[i].url) !== -1 || paperOrder[i].url.indexOf(currentPath) !== -1) {
      currentIdx = i;
      break;
    }
  }

  if (currentIdx === -1) return; // Not a paper in the list

  var nav = document.getElementById('paper-nav');
  if (!nav) return;

  var prev = currentIdx > 0 ? paperOrder[currentIdx - 1] : null;
  var next = currentIdx < paperOrder.length - 1 ? paperOrder[currentIdx + 1] : null;
  var listLink = '{{ "/" | relative_url }}';

  var html = '';
  if (prev) {
    html += '<a href="' + prev.url + '" class="prev-link">← ' + prev.short + '</a>';
  }
  var isFirst = currentIdx === 0;
  var backText = isFirst ? '← 返回论文列表' : '返回论文列表';
  html += '<a href="' + listLink + '" class="back-link">' + backText + '</a>';
  if (next) {
    html += '<a href="' + next.url + '" class="next-link">' + next.short + ' →</a>';
  }
  nav.innerHTML = html;

  // Also inject into right sidebar
  var sidebarNav = document.getElementById('sidebar-paper-nav');
  if (sidebarNav) {
    var sidebarHtml = '';
    if (prev) sidebarHtml += '<a href="' + prev.url + '" class="right-sidebar-link">← ' + prev.short + '</a>';
    if (next) sidebarHtml += '<a href="' + next.url + '" class="right-sidebar-link">' + next.short + ' →</a>';
    sidebarNav.innerHTML = sidebarHtml;
  }
})();
</script>

<script>
(function() {
  var body = document.getElementById('paper-body');
  var nav = document.getElementById('toc-nav');
  if (!body || !nav) return;

  var headings = body.querySelectorAll('h2, h3');
  if (headings.length === 0) {
    document.getElementById('toc-sidebar').style.display = 'none';
    return;
  }

  var ul = document.createElement('ul');
  ul.className = 'toc-list';

  headings.forEach(function(h, i) {
    if (!h.id) {
      h.id = 'heading-' + i;
    }
    var li = document.createElement('li');
    li.className = 'toc-item toc-' + h.tagName.toLowerCase();
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'toc-link';
    li.appendChild(a);
    ul.appendChild(li);
  });

  nav.appendChild(ul);

  var links = nav.querySelectorAll('.toc-link');
  var headingArr = Array.from(headings);

  function updateActive() {
    var scrollPos = window.scrollY + 100;
    var current = -1;
    for (var i = 0; i < headingArr.length; i++) {
      if (headingArr[i].offsetTop <= scrollPos) {
        current = i;
      }
    }
    links.forEach(function(link, idx) {
      link.classList.toggle('active', idx === current);
    });
  }

  window.addEventListener('scroll', updateActive);
  updateActive();
})();
</script>

<script>
(function() {
  function rebuildWithLineNumbers() {
    document.querySelectorAll('div.highlighter-rouge').forEach(function(outer) {
      // Skip mermaid blocks
      if (outer.classList.contains('language-mermaid')) {
        var codeEl = outer.querySelector('pre code');
        if (codeEl) {
          var mermaidDiv = document.createElement('div');
          mermaidDiv.className = 'mermaid';
          mermaidDiv.textContent = codeEl.textContent;
          outer.parentNode.insertBefore(mermaidDiv, outer);
          outer.style.display = 'none';
        }
        return;
      }

      var code = outer.querySelector('pre code');
      if (!code) return;

      var html = code.innerHTML;
      if (html.endsWith('\n')) html = html.slice(0, -1);
      var lines = splitByNewline(html);

      var wrapper = document.createElement('div');
      wrapper.className = 'code-block highlight';

      lines.forEach(function(lineHTML, i) {
        var row = document.createElement('div');
        row.className = 'code-row';

        var ln = document.createElement('span');
        ln.className = 'code-ln';
        ln.textContent = String(i + 1);

        var cell = document.createElement('span');
        cell.className = 'code-cell';
        cell.innerHTML = lineHTML;

        row.appendChild(ln);
        row.appendChild(cell);
        wrapper.appendChild(row);
      });

      outer.innerHTML = '';
      outer.appendChild(wrapper);
    });

    if (typeof mermaid !== 'undefined') {
      mermaid.run();
    }
  }

  function splitByNewline(html) {
    var lines = [], cur = '', inTag = false;
    for (var i = 0; i < html.length; i++) {
      var c = html[i];
      if      (c === '<') { inTag = true;  cur += c; }
      else if (c === '>') { inTag = false; cur += c; }
      else if (c === '\n' && !inTag) { lines.push(cur); cur = ''; }
      else { cur += c; }
    }
    if (cur !== '') lines.push(cur);
    return lines;
  }

  document.addEventListener('DOMContentLoaded', rebuildWithLineNumbers);
})();
</script>
