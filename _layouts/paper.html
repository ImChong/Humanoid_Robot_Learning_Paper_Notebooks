---
layout: default
---
<article class="paper-content">
  <nav class="breadcrumb">
    <a href="{{ '/' | relative_url }}" data-en="🏠 Home" data-zh="🏠 首页">🏠 Home</a>
    {% assign path_parts = page.url | split: '/' %}
    {% if path_parts.size > 3 %}
      <span class="sep">›</span>
      <span class="crumb-category">{{ path_parts[2] | replace: '_', ' ' }}</span>
    {% endif %}
  </nav>

  <div class="paper-layout">
    <aside class="toc-sidebar" id="toc-sidebar">
      <div class="toc-wrapper">
        <h3 class="toc-title" data-en="📑 Contents" data-zh="📑 目录">📑 目录</h3>
        <nav class="toc-nav" id="toc-nav"></nav>
      </div>
    </aside>

    <div class="paper-body" id="paper-body">
      {{ content }}
    </div>

    <aside class="right-sidebar" id="right-sidebar">
      <div class="right-sidebar-wrapper">
        <a href="#" class="right-sidebar-link" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;" data-en="↑ Back to top" data-zh="↑ 回到顶部">↑ Back to top</a>
        <a href="{{ '/' | relative_url }}" class="right-sidebar-link" data-en="← Back to list" data-zh="← 返回论文列表">← Back to list</a>
      </div>
    </aside>
  </div>

  <div class="paper-nav">
    <a href="{{ '/' | relative_url }}" class="back-link" data-en="← Back to list" data-zh="← 返回论文列表">← Back to list</a>
  </div>
</article>

<script>
(function() {
  var body = document.getElementById('paper-body');
  var nav = document.getElementById('toc-nav');
  if (!body || !nav) return;

  var headings = body.querySelectorAll('h2, h3');
  if (headings.length === 0) {
    document.getElementById('toc-sidebar').style.display = 'none';
    return;
  }

  var ul = document.createElement('ul');
  ul.className = 'toc-list';

  headings.forEach(function(h, i) {
    // Ensure heading has an id for anchor
    if (!h.id) {
      h.id = 'heading-' + i;
    }
    var li = document.createElement('li');
    li.className = 'toc-item toc-' + h.tagName.toLowerCase();
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'toc-link';
    li.appendChild(a);
    ul.appendChild(li);
  });

  nav.appendChild(ul);

  // Highlight active section on scroll
  var links = nav.querySelectorAll('.toc-link');
  var headingArr = Array.from(headings);

  function updateActive() {
    var scrollPos = window.scrollY + 100;
    var current = -1;
    for (var i = 0; i < headingArr.length; i++) {
      if (headingArr[i].offsetTop <= scrollPos) {
        current = i;
      }
    }
    links.forEach(function(link, idx) {
      link.classList.toggle('active', idx === current);
    });
  }

  window.addEventListener('scroll', updateActive);
  updateActive();
})();
</script>

<script>
// Rebuild block-level rouge code blocks with per-line divs for reliable line number alignment.
// Inline code (code.highlighter-rouge) is intentionally skipped.
(function() {
  document.querySelectorAll('div.highlighter-rouge').forEach(function(outer) {
    var codePre = outer.querySelector('pre.highlight code');
    if (!codePre) return;

    var codeHTML = codePre.innerHTML;
    // Remove single trailing newline added by rouge
    if (codeHTML.endsWith('\n')) codeHTML = codeHTML.slice(0, -1);
    var codeLines = splitHTMLByNewlines(codeHTML);

    var wrapper = document.createElement('div');
    wrapper.className = 'rouge-rebuilt highlight';

    for (var i = 0; i < codeLines.length; i++) {
      var row = document.createElement('div');
      row.className = 'rouge-line';

      var gutter = document.createElement('span');
      gutter.className = 'rouge-ln';
      gutter.textContent = String(i + 1);

      var cell = document.createElement('span');
      cell.className = 'rouge-code-cell';
      cell.innerHTML = codeLines[i];

      row.appendChild(gutter);
      row.appendChild(cell);
      wrapper.appendChild(row);
    }

    outer.innerHTML = '';
    outer.appendChild(wrapper);
  });

  function splitHTMLByNewlines(html) {
    var lines = [];
    var current = '';
    var inTag = false;
    for (var i = 0; i < html.length; i++) {
      var ch = html[i];
      if (ch === '<') { inTag = true; current += ch; }
      else if (ch === '>') { inTag = false; current += ch; }
      else if (ch === '\n' && !inTag) {
        lines.push(current);
        current = '';
      } else {
        current += ch;
      }
    }
    if (current !== '') lines.push(current);
    return lines;
  }
})();
</script>
